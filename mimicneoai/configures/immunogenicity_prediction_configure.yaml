# Immunogenicity prediction config template
path:
  input_csv: "/path/to/input_peptide_hla.csv"
  output_csv: "/path/to/output_predictions.csv"
  model_path: "/path/to/MimicNeoAI_Microbial_Pred.pth"
  hla_fasta: "/path/to/hla_prot.fasta"
  # Optional ONNX export path. Leave empty to disable.
  export_onnx: ""

args:
  batch_size: 512
  num_processes: 8
  verbose: true
  device: "auto"  # auto | cpu | cuda | cuda:<index>
  export_onnx_only: false
  onnx_opset: 17

io:
  peptide_col: "peptide"
  hla_col: "hla"
  score_col: "immunogenicity_score"
